name: dao-fleet-devin-cloud

# ════════════════════════════════════════════════════════════════════
# 印 113 · 反者道之动 · GH 面板综合管 · Devin VM 反代核心
#
#   帛书·四十三:「天下莫柔弱于水 · 而攻坚强者莫之能胜也 · 弱之胜强 · 柔之胜刚」
#   帛书·八十:  「邻邦相望 · 鸡狗之声相闻 · 民至老死不相往来」
#
# 主公诏 (2026-05-16 00:45):
#   「重新锚定本源底层 · 彻底改造反代底层 · 均运行于 Devin cloud 虚拟机反代
#    GitHub 做用户端面板综合管理一切 · 反代VM于GitHub VM鸡犬相闻 · 民至老死不相往来」
#
# 反者之核 (vs 印 95-100 dao-fleet-cloud.yml):
#   旧: GH Actions runner 跑 fleet_vm_unit.js + cf tunnel
#   新: GH Actions runner 仅 deployer · spawn N Devin VM + deploy dao_proxy · 退
#
# 链路:
#   gist (Devin token 池) → GH Actions deployer → spawn N Devin VM
#   → omni router 自带公网 → deploy dao_proxy v0.4.0 → 报 N URL 回 gist
#   → GH Actions 退 · daemon 在 Devin VM 自管 (印 112 已证)
#
# 触发:
#   ① workflow_dispatch (主公手动/Web UI 一键)
#   ② schedule cron · 每 5h · 自续 (主公关机时仍真活)
#
# 必设 GitHub repo secrets:
#   - DAO_POOL_GIST_ID  (印 95 一次 cli.js init 输出)
#   - DAO_POOL_PAT      (PAT · scope: gist)
#
# 道义守 (帛书·八十 · 鸡犬相闻):
#   1. GH Actions 不跑 LLM proxy daemon · 仅做 deployer
#   2. Devin VM dao_proxy 不知 GH 存在 · 自管自家 token 池
#   3. 用户面板直调 Devin VM URL · 不通过 GH 中转
#   4. 两 VM 通 Gist 间接交流 · 不互调 (民至老死不相往来)
# ════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      n:
        description: '起 N Devin VM (默 4 · max 8 · 防 ACU 浪)'
        required: false
        default: '4'
      gist_id:
        description: '印 100 · token 池 gist id (留空用 secret)'
        required: false
        default: ''
      pat:
        description: '印 100 · gist PAT (留空用 secret)'
        required: false
        default: ''
  schedule:
    # 每 5 小时一次 · cron 接续 · daemon 真永活
    - cron: '0 */5 * * *'
  # 印 116 损: 删 push trigger
  # 根: push 触发无 inputs · secrets fallback 即 secrets 缺则必失
  # 治: 仅 workflow_dispatch (用户主动) + schedule (cron 自续)
  # 帛书·四十八「闻道者日损 · 损之又损 · 以至于无为」

permissions:
  contents: read

# 同时仅一 run · 旧 run 退 · 防 ACU 浪
concurrency:
  group: dao-fleet-devin-cloud
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: 一 · checkout
        uses: actions/checkout@v4

      - name: 二 · setup Node 22 (built-in WebSocket · vm_omni 需)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 三 · 拉 Devin token 池 · gist
        id: pull
        env:
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
        run: |
          set -e
          echo "════════════════════════════════════════"
          echo "§ 印 113 · dao-fleet-devin-cloud · 起跑"
          echo "  runner  : $(hostname)"
          echo "  trigger : ${{ github.event_name }}"
          echo "  run id  : ${{ github.run_id }}"
          echo "  gist    : ${DAO_POOL_GIST_ID:0:8}..."
          echo "════════════════════════════════════════"

          if [ -z "$DAO_POOL_GIST_ID" ] || [ -z "$DAO_POOL_PAT" ]; then
            echo ""
            echo "  ✗ 缺 secrets · 主公请:"
            echo "    1. 本机: cd packages/dao-pool && node cli.js init --pat <PAT>"
            echo "    2. 设 repo secrets DAO_POOL_GIST_ID + DAO_POOL_PAT"
            echo "    3. 重 dispatch"
            exit 1
          fi
          echo "  ✓ secrets 备"

      - name: 四 · ★ deploy N Devin VM + dao_proxy v0.4.0
        id: deploy
        env:
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
          N_VMS: ${{ github.event.inputs.n || '4' }}
        run: |
          set -e
          echo ""
          echo "═══ § 4 · 反者道之动 · deploy $N_VMS 件 Devin VM ═══"
          cd packages/dao-devin-vm
          node deployer.js \
            --gist-id "$DAO_POOL_GIST_ID" \
            --pat "$DAO_POOL_PAT" \
            --n "$N_VMS"

      - name: 五 · keep alive · 350 min · 5 min poll · VM 死即起新
        env:
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
          N_VMS: ${{ github.event.inputs.n || '4' }}
        run: |
          set +e
          echo ""
          echo "═══ § 5 · keep alive · 最 350 min ═══"
          MAX_MIN=350
          START=$(date +%s)
          MAX_SEC=$((MAX_MIN * 60))
          TICK=0
          while true; do
            NOW=$(date +%s)
            EL=$((NOW - START))
            if [ $EL -ge $MAX_SEC ]; then
              echo "[$(date -u +%H:%M:%S)] ★ 达 ${MAX_MIN}m · 退"
              break
            fi
            sleep 300  # 5 min poll
            TICK=$((TICK + 1))
            EL_MIN=$((EL / 60))
            echo "[$(date -u +%H:%M:%S)] tick=$TICK el=${EL_MIN}m · 重 deploy 替死者"

            cd packages/dao-devin-vm
            timeout 200 node deployer.js \
              --gist-id "$DAO_POOL_GIST_ID" \
              --pat "$DAO_POOL_PAT" \
              --n "$N_VMS" 2>&1 | tail -30 || echo "  ⚠ tick=$TICK deploy 失"
            cd "$GITHUB_WORKSPACE"
          done

      - name: 末 · 清死 daemon URL (gist)
        if: always()
        env:
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
        run: |
          echo ""
          echo "═══ 末 · 清死 daemon ═══"
          if [ -n "$DAO_POOL_GIST_ID" ] && [ -n "$DAO_POOL_PAT" ]; then
            cd packages/dao-devin-vm 2>/dev/null && \
            node -e "
              const https = require('https');
              function g(m,p,b){return new Promise((rs,rj)=>{const d=b?JSON.stringify(b):null;
                const r=https.request({hostname:'api.github.com',port:443,path:p,method:m,
                headers:{Authorization:'token $DAO_POOL_PAT','User-Agent':'cl','Accept':'application/vnd.github+json','Content-Type':'application/json',
                ...(d?{'Content-Length':Buffer.byteLength(d)}:{})}},x=>{let bd='';x.on('data',c=>bd+=c).on('end',()=>{try{rs(JSON.parse(bd))}catch{rs(bd)}})});
                r.on('error',rj);if(d)r.write(d);r.end();});}
              (async()=>{
                try {
                  const gg=await g('GET','/gists/$DAO_POOL_GIST_ID');
                  const pool=JSON.parse(gg.files['dao-pool.json'].content);
                  if(!pool.daemons) return console.log('  ◦ 无 daemons');
                  const old=pool.daemons.length;
                  pool.daemons = pool.daemons.filter(d => d.source !== '印 113 · deployer · GH Actions');
                  pool.last_cleaned_113 = new Date().toISOString();
                  await g('PATCH','/gists/$DAO_POOL_GIST_ID',{files:{'dao-pool.json':{content:JSON.stringify(pool,null,2)}}});
                  console.log('  ✓ 清 印 113 daemon · ' + old + ' → ' + pool.daemons.length);
                } catch(e){console.error('  ⚠',e.message)}
              })();
            " || echo "  ⚠ 清失"
          fi
