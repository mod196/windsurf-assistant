name: dao-vm-simple

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Keep-alive duration in minutes (max 330)'
        required: false
        default: '300'

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Start HTTP server on port 8080
        run: |
          cat > /tmp/s.js << 'EOF'
          "use strict";
          const h=require("http"),{execSync:X}=require("child_process");
          h.createServer((q,r)=>{
            const C={"Content-Type":"application/json","Access-Control-Allow-Origin":"*"};
            r.writeHead(200,C);
            if(q.url==="/_/health") return r.end(JSON.stringify({ok:true,seal:"ga-vm",ts:Date.now(),hostname:require("os").hostname()}));
            if(q.url==="/_/run" && q.method==="POST"){
              let b="";q.on("data",c=>b+=c).on("end",()=>{
                try{const{cmd="id",timeout=30000}=JSON.parse(b||"{}");r.end(JSON.stringify({ok:true,stdout:X(cmd,{timeout,encoding:"utf8",maxBuffer:20971520})}));}
                catch(e){r.end(JSON.stringify({ok:false,e:e.message}));}
              });return;
            }
            r.end("{}");
          }).listen(8080,"0.0.0.0");
          console.log("Server running on :8080");
          EOF
          node /tmp/s.js &
          sleep 2
          curl -s http://localhost:8080/_/health

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start tunnel and get URL
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:8080 --no-autoupdate > /tmp/cf.log 2>&1 &
          CF_PID=$!
          echo "Waiting for CF URL..."
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log 2>/dev/null | head -1)
            if [ -n "$URL" ]; then
              echo "=========================================="
              echo "CF_URL=$URL"
              echo "=========================================="
              echo "url=$URL" >> $GITHUB_OUTPUT
              break
            fi
          done
          if [ -z "$URL" ]; then
            cat /tmp/cf.log
            exit 1
          fi

      - name: Verify tunnel
        run: |
          URL="${{ steps.tunnel.outputs.url }}"
          echo "Testing $URL/_/health ..."
          for i in 1 2 3 4 5; do
            sleep 5
            RESULT=$(curl -s --max-time 10 "$URL/_/health" || echo "fail")
            echo "  attempt $i: $RESULT"
            if echo "$RESULT" | grep -q '"ok":true'; then
              echo "VERIFIED: $URL"
              break
            fi
          done

      - name: Keep alive
        run: |
          URL="${{ steps.tunnel.outputs.url }}"
          DURATION="${{ github.event.inputs.duration || '300' }}"
          echo "Keeping alive for ${DURATION} minutes..."
          echo "CF URL: $URL"
          START=$(date +%s)
          MAX_SEC=$((DURATION * 60))
          TICK=0
          while true; do
            NOW=$(date +%s)
            EL=$((NOW-START))
            if [ $EL -ge $MAX_SEC ]; then
              echo "Done after ${DURATION} min"
              break
            fi
            sleep 60
            TICK=$((TICK+1))
            H=$(curl -s --max-time 5 http://localhost:8080/_/health 2>/dev/null | head -c 60)
            echo "[$(date -u +%H:%M:%S)] tick=$TICK el=$((EL/60))m health=$H url=$URL"
          done
