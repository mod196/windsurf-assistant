name: dao-fleet
# ════════════════════════════════════════════════════════════════
# 道：「治大国若烹小鲜」（六十章） · 「天地之间其犹橐钥与」（五章）
# 印 96 · GitHub Actions 长跑 dao-core fleet_vm_unit · 用 Devin Cloud B 路
#
#   ┌─────────────────────────────────────────────────────────┐
#   │ 主公本机 WAM 桥 (cf tunnel · adjustable-expenditures-*) │
#   │   ↓ active-token (X-DAO-BRIDGE-AUTH)                    │
#   │ Actions ubuntu-24.04 (Node 22)                          │
#   │   ↓ ~/.dao/accounts.json                                │
#   │ packages/dao-core/fleet_vm_unit.js --port 7862 --public │
#   │   ↓ cloudflared tunnel                                  │
#   │ trycloudflare URL → POST /report-daemon-url 回 WAM 桥   │
#   └─────────────────────────────────────────────────────────┘
#
# 触发：仅 workflow_dispatch (人工 / 永动脚本) · 不挂 push
# 时长：350 min ≈ 5h50m (≤ 6h hard limit) · 永动接力
# ════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      wam_url:
        description: 'WAM 桥 公网 URL (主公本机之 cf tunnel)'
        required: true
        default: 'https://adjustable-expenditures-sales-transcripts.trycloudflare.com'
      wam_auth:
        description: 'WAM 桥之 .bridge_auth (建议从 secrets · 此为 fallback)'
        required: false
        default: ''
      max_minutes:
        description: '最大跑时长 (分钟)'
        required: true
        default: '300'

permissions:
  contents: read

jobs:
  fleet:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: 一 · checkout
        uses: actions/checkout@v4

      - name: 二 · setup Node 22 (built-in WebSocket · dao-core B 路 wss 需)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 三 · 全 e2e (拉 token · 起 fleet · cf tunnel · 报回 · 接力)
        env:
          WAM_URL: ${{ github.event.inputs.wam_url }}
          WAM_AUTH_INPUT: ${{ github.event.inputs.wam_auth }}
          WAM_AUTH_SECRET: ${{ secrets.WAM_BRIDGE_AUTH }}
          MAX_MIN: ${{ github.event.inputs.max_minutes }}
        run: |
          set +e
          echo "════════════════════════════════════════"
          echo "§ 印 96 · windsurf-assistant fleet · 起跑"
          echo "  runner: $(hostname)"
          echo "  user:   $(whoami)"
          echo "  WAM:    $WAM_URL"
          echo "════════════════════════════════════════"

          # § auth 取舍 · secret 优先 · 否则 input fallback
          WAM_AUTH="${WAM_AUTH_SECRET:-$WAM_AUTH_INPUT}"
          if [ -z "$WAM_AUTH" ]; then
            echo "  ✗ 缺 WAM_AUTH · 可在 repo secrets 设 WAM_BRIDGE_AUTH 或 input 之 wam_auth"
            exit 1
          fi
          echo "  ✓ WAM_AUTH 出 · prefix: ${WAM_AUTH:0:8}..."

          # § 验 WAM 桥通
          echo ""
          echo "═══ § 1 · 验 WAM 桥 ═══"
          if ! curl -fsSL --max-time 15 "$WAM_URL/health" > /tmp/wam_health.json; then
            echo "  ✗ WAM 桥不通"
            exit 2
          fi
          node -e "const j=JSON.parse(require('fs').readFileSync('/tmp/wam_health.json','utf-8'));console.log('  ✓ WAM 桥 · uptime '+Math.round(j.uptimeMs/1000)+'s · active='+j.wam.activeEmail);"

          # § 拉 active token
          echo ""
          echo "═══ § 2 · 拉 active token ═══"
          curl -fsSL --max-time 15 -H "X-DAO-BRIDGE-AUTH: $WAM_AUTH" "$WAM_URL/active-token" > /tmp/active_token.json
          if ! grep -q '"ok":true' /tmp/active_token.json; then
            echo "  ✗ active-token 拉失败"
            cat /tmp/active_token.json
            exit 3
          fi
          node -e "const j=JSON.parse(require('fs').readFileSync('/tmp/active_token.json','utf-8'));console.log('  ✓ token · email='+j.email+' · serverUrl='+(j.serverUrl||'(无)'));"

          # § 立 ~/.dao/accounts.json (字段映射 · WAM 桥之 token→apiKey · serverUrl→apiServerUrl)
          echo ""
          echo "═══ § 3 · 立 ~/.dao/accounts.json ═══"
          mkdir -p "$HOME/.dao"
          node -e "
            const fs=require('fs');
            const t=JSON.parse(fs.readFileSync('/tmp/active_token.json','utf-8'));
            const apiKey = t.apiKey || t.token;
            const apiServerUrl = t.apiServerUrl || t.serverUrl || 'https://server.self-serve.windsurf.com';
            if (!apiKey) { console.error('[fatal] active-token 无 token/apiKey'); process.exit(1); }
            const acct={
              version: 2,
              accounts: [{
                email: t.email,
                apiKey,
                type: apiKey.startsWith('devin-session-token\$')?'devin':'sk-ws',
                apiServerUrl,
                added: new Date().toISOString(),
                lastUsed: null,
                useCount: 0
              }],
              active: t.email,
              rotateMode: 'manual',
              lastRotateAt: 0,
              rotateCount: 0
            };
            fs.writeFileSync(process.env.HOME+'/.dao/accounts.json', JSON.stringify(acct,null,2));
            console.log('  ✓ accounts.json 立 · type='+acct.accounts[0].type+' · apiKey prefix='+apiKey.slice(0,18)+'...');
          "

          # § 装 cloudflared
          echo ""
          echo "═══ § 4 · 装 cloudflared ═══"
          curl -fsSL -o /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cloudflared
          echo "  ✓ $(/tmp/cloudflared --version | head -1)"

          # § 起 fleet_vm_unit
          echo ""
          echo "═══ § 5 · 起 fleet_vm_unit · port 7862 · --public ═══"
          mkdir -p /tmp/dao_logs
          cd "$GITHUB_WORKSPACE/packages/dao-core"
          nohup node fleet_vm_unit.js \
            --port 7862 \
            --public \
            > /tmp/dao_logs/fleet.log 2>&1 &
          FLEET_PID=$!
          echo "  fleet PID=$FLEET_PID · 等 5s …"
          sleep 5

          if ! curl -fsS --max-time 5 http://127.0.0.1:7862/health > /tmp/fleet_health.json; then
            echo "  ✗ fleet_vm_unit 起失败"
            tail -50 /tmp/dao_logs/fleet.log
            exit 4
          fi
          node -e "const j=JSON.parse(require('fs').readFileSync('/tmp/fleet_health.json','utf-8'));console.log('  ✓ fleet · '+JSON.stringify(j).slice(0,300));"

          # § cf tunnel
          echo ""
          echo "═══ § 6 · cloudflared tunnel · 暴 7862 公网 ═══"
          nohup /tmp/cloudflared tunnel --no-autoupdate --protocol http2 \
            --url http://127.0.0.1:7862 \
            > /tmp/dao_logs/cf.log 2>&1 &
          CF_PID=$!
          echo "  cf PID=$CF_PID · 等 cf URL …"

          DAEMON_URL=""
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/dao_logs/cf.log 2>/dev/null | head -1)
            if [ -n "$URL" ]; then
              DAEMON_URL=$URL
              echo "  ★ DAEMON_URL=$URL after ${i}x2s"
              break
            fi
          done
          if [ -z "$DAEMON_URL" ]; then
            echo "  ✗ cf URL 未拿 · log:"
            tail -50 /tmp/dao_logs/cf.log
            exit 5
          fi

          # § POST 报回 WAM 桥
          echo ""
          echo "═══ § 7 · 报回 WAM 桥 ═══"
          HOST="actions-${{ github.run_id }}"
          BODY="{\"url\":\"$DAEMON_URL\",\"host\":\"$HOST\",\"sessionId\":\"$HOST\",\"daemonPort\":7862}"
          curl -fsSL --max-time 15 -X POST -H 'Content-Type: application/json' -d "$BODY" "$WAM_URL/report-daemon-url" || echo "  ✗ POST fail (但 daemon 仍活)"
          echo ""
          echo "  ✓ daemon URL: $DAEMON_URL"

          # § 验 e2e (公网 chat completion · B 路 Devin · /dc/v1/...)
          echo ""
          echo "═══ § 8 · 验真 e2e · 公网 chat completion (B 路 · Devin Cloud) ═══"
          sleep 10
          CHAT_BODY='{"model":"devin-cloud","messages":[{"role":"user","content":"道生何？仅一字"}],"max_tokens":10}'
          echo "  → POST $DAEMON_URL/dc/v1/chat/completions"
          curl -sS --max-time 60 -X POST -H 'Content-Type: application/json' -d "$CHAT_BODY" "$DAEMON_URL/dc/v1/chat/completions" 2>&1 | head -c 800
          echo ""

          # § keep alive
          echo ""
          echo "═══ § 9 · keep alive · 最 $MAX_MIN 分 ═══"
          START=$(date +%s)
          MAX_SEC=$((MAX_MIN * 60))
          TICK=0
          while true; do
            NOW=$(date +%s)
            EL=$((NOW - START))
            if [ $EL -ge $MAX_SEC ]; then
              echo "[$(date -u +%H:%M:%S)] ★ 达 $MAX_MIN 分 · 退"
              break
            fi
            sleep 60
            TICK=$((TICK + 1))
            EL_MIN=$((EL / 60))
            H=$(curl -sS --max-time 5 http://127.0.0.1:7862/health 2>/dev/null | head -c 200)
            P=$(curl -sS --max-time 8 "$DAEMON_URL/health" 2>/dev/null | head -c 50)
            echo "[$(date -u +%H:%M:%S)] tick=$TICK el=${EL_MIN}m local=$H public=$P"

            # 每 5 tick · 重报 · 防 WAM 桥重启丢
            if [ $((TICK % 5)) -eq 0 ]; then
              curl -sS --max-time 10 -X POST -H 'Content-Type: application/json' -d "$BODY" "$WAM_URL/report-daemon-url" > /dev/null 2>&1 && echo "  · 重报"
            fi

            # 每 30 tick (30 min) · 重 fetch active token + 写 accounts.json
            # (WAM 桥 auto-rotate 后 GitHub Actions 之 daemon 用旧 token 会 401)
            if [ $((TICK % 30)) -eq 0 ]; then
              echo "  · 30 min · 检 token 是否变"
              NEW_TOK=$(curl -sS --max-time 10 -H "X-DAO-BRIDGE-AUTH: $WAM_AUTH" "$WAM_URL/active-token" 2>/dev/null | head -c 1000)
              NEW_EMAIL=$(echo "$NEW_TOK" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).email||'')}catch{console.log('')}})")
              CUR_EMAIL=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.HOME+'/.dao/accounts.json','utf-8')).active||'')")
              if [ -n "$NEW_EMAIL" ] && [ "$NEW_EMAIL" != "$CUR_EMAIL" ]; then
                echo "  ★ token 换号 · $CUR_EMAIL → $NEW_EMAIL · 重启 fleet_vm_unit"
                echo "$NEW_TOK" > /tmp/active_token.json
                node -e "
                  const fs=require('fs');
                  const t=JSON.parse(fs.readFileSync('/tmp/active_token.json','utf-8'));
                  const apiKey = t.apiKey || t.token;
                  const apiServerUrl = t.apiServerUrl || t.serverUrl || 'https://server.self-serve.windsurf.com';
                  const acct={version:2,accounts:[{email:t.email,apiKey,type:apiKey.startsWith('devin-session-token\$')?'devin':'sk-ws',apiServerUrl,added:new Date().toISOString(),lastUsed:null,useCount:0}],active:t.email,rotateMode:'manual',lastRotateAt:0,rotateCount:0};
                  fs.writeFileSync(process.env.HOME+'/.dao/accounts.json', JSON.stringify(acct,null,2));
                "
                kill $FLEET_PID 2>/dev/null || true
                sleep 2
                cd "$GITHUB_WORKSPACE/packages/dao-core"
                nohup node fleet_vm_unit.js --port 7862 --public > /tmp/dao_logs/fleet.log 2>&1 &
                FLEET_PID=$!
                echo "  · fleet 重启 PID=$FLEET_PID"
              else
                echo "  · token 未变 ($CUR_EMAIL)"
              fi
            fi
          done

      - name: 末 · 状态 dump (always)
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "§ 末状态 dump"
          echo "════════════════════════════════════════"
          echo "  fleet log tail:"
          tail -50 /tmp/dao_logs/fleet.log 2>/dev/null || echo "(无)"
          echo ""
          echo "  cf log tail:"
          tail -30 /tmp/dao_logs/cf.log 2>/dev/null || echo "(无)"
          echo ""
          echo "  /health 末:"
          curl -sS --max-time 5 http://127.0.0.1:7862/health 2>&1 | head -c 500 || echo "(daemon 死)"
