name: dao-shell
on:
  workflow_dispatch:
    inputs:
      cmd:
        description: 'Shell command to run'
        required: true
        default: 'id && hostname && uname -a'
      ntfy:
        description: 'ntfy.sh topic for results'
        required: false
        default: 'dao-shell-276'
jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: run-cmd
        run: |
          CMD="${{ inputs.cmd }}"
          NTFY="${{ inputs.ntfy }}"
          echo "Running: $CMD"
          OUT=$(bash -c "$CMD" 2>&1 || echo "ERROR")
          echo "$OUT"
          curl -s -X POST "https://ntfy.sh/${NTFY}" \
            -H "Title: GHA-Result" \
            -H "Content-Type: text/plain" \
            -d "$OUT" || true

      - name: shell-server
        run: |
          NTFY="${{ inputs.ntfy }}"
          # Start Python relay server
          python3 << 'PYEOF'
import http.server, json, subprocess, threading, os

class H(http.server.BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def do_GET(self):
        self.send_response(200)
        self.send_header('Content-Type', 'application/json')
        self.end_headers()
        import socket
        self.wfile.write(json.dumps({'ok': True, 'host': socket.gethostname()}).encode())
    def do_POST(self):
        n = int(self.headers.get('Content-Length', 0))
        data = json.loads(self.rfile.read(n))
        cmd = data.get('cmd', 'id')
        try:
            out = subprocess.check_output(cmd, shell=True, timeout=30, stderr=subprocess.STDOUT).decode()
        except subprocess.CalledProcessError as e:
            out = (e.stdout or b'').decode() + str(e)
        self.send_response(200)
        self.send_header('Content-Type', 'application/json')
        self.end_headers()
        self.wfile.write(json.dumps({'out': out}).encode())

t = threading.Thread(target=lambda: http.server.HTTPServer(('', 9090), H).serve_forever())
t.daemon = True
t.start()
import time; time.sleep(2)
print("Server on 9090")
PYEOF
          sleep 2
          # Install and start cloudflared
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cfd 2>/dev/null
          chmod +x /tmp/cfd
          nohup /tmp/cfd tunnel --url http://localhost:9090 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 25
          CF_URL=$(grep -o 'https://[a-z0-9-]*.trycloudflare.com' /tmp/cf.log | tail -1)
          echo "SHELL_URL=$CF_URL"
          curl -s -X POST "https://ntfy.sh/${NTFY}" \
            -H "Title: SHELL_URL" \
            -H "Content-Type: text/plain" \
            -d "URL=$CF_URL" || true
          # Keep alive 20 minutes
          for i in $(seq 1 20); do
            sleep 60
            echo "alive $i/20 url=$CF_URL"
          done
