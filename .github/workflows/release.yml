name: Sync plugins to Release

# 道自动 · 去心：按模块版本往 main 推码即可，本作业只构建并发布「真正改动的模块」。
# 每个模块发到各自的 tag <key>-v<version>（资产含各自的 VSIX），互不干扰（改谁发谁，老的不动）。
# 末尾据各模块当前版本自动维护 README 下载索引。权限内 GITHUB_TOKEN，跑在 GitHub 原生环境。
# 单一事实来源 = tools/modules.json（detect / notes / index 三者都读它）。
# 触发：push 到 main（命中 plugins/** · 构建/发布基础设施）；亦可手动 workflow_dispatch（all=true 强制全量）。
#       auto-merge 合并后会 dispatch 本作业 —— 据并入的差异自动发动相应模块。

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "scripts/build-vsix.mjs"
      - "tools/modules.json"
      - "tools/detect-modules.js"
      - "tools/release-notes.js"
      - "tools/gen-readme-index.js"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      all:
        description: "强制全部 vsix 模块发版 (true/false)"
        default: "false"

permissions:
  contents: write

concurrency:
  group: release-decentralized
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.d.outputs.modules }}
      any: ${{ steps.d.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - id: d
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.all }}" = "true" ]; then
            MODS=$(node tools/detect-modules.js --all)
          else
            BEFORE="${{ github.event.before }}"
            ZERO="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              git diff --name-only "$BEFORE" "${{ github.sha }}" > changed.txt
            else
              # workflow_dispatch / 无 before：取合并提交相对首亲的差异 = 被合 PR 的改动
              git diff --name-only "${{ github.sha }}^" "${{ github.sha }}" > changed.txt 2>/dev/null || git diff --name-only HEAD~1 HEAD > changed.txt
            fi
            echo "changed files:"; cat changed.txt || true
            MODS=$(node tools/detect-modules.js --files changed.txt)
          fi
          echo "modules=$MODS" >> "$GITHUB_OUTPUT"
          if [ "$MODS" = "[]" ]; then echo "any=false" >> "$GITHUB_OUTPUT"; else echo "any=true" >> "$GITHUB_OUTPUT"; fi
          echo "detected modules: $MODS"

  release:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        key: ${{ fromJson(needs.detect.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build ${{ matrix.key }} VSIX
        env:
          KEY: ${{ matrix.key }}
        run: |
          set -e
          NAME=$(node -p "require('./tools/modules.json').modules.find(m=>m.key===process.env.KEY).name")
          node scripts/build-vsix.mjs "$NAME"
      - name: Create/update Release for ${{ matrix.key }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ matrix.key }}
        run: |
          set -e
          DIR=$(node -p "require('./tools/modules.json').modules.find(m=>m.key===process.env.KEY).dir")
          NAME=$(node -p "require('./tools/modules.json').modules.find(m=>m.key===process.env.KEY).name")
          VER=$(node -p "require('./$DIR/package.json').version")
          TAG="${KEY}-v${VER}"
          VSIX="dist/${NAME}-${VER}.vsix"
          echo "module=$KEY dir=$DIR vsix=$VSIX tag=$TAG"
          ls -lh "$VSIX"
          node tools/release-notes.js "$KEY" > notes.md
          TITLE="$KEY v$VER"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file notes.md --draft=false
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" "$VSIX" --title "$TITLE" --notes-file notes.md --target "$GITHUB_SHA"
          fi
          echo "released $TAG"

  index:
    needs: [detect, release]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate README module index
        run: |
          set -e
          node tools/gen-readme-index.js || true
      - name: Commit README if changed
        run: |
          set -e
          if git diff --quiet -- README.md; then
            echo "README unchanged"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): 自动同步模块下载索引 [skip ci]"
          git push origin main
