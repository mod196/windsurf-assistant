name: dao-vm-free-loop
# ═══════════════════════════════════════════════════════════════
# 印272 · 反者道之动 · 自包含永续VM Loop
# 「无为而无不为」── 无需任何外部secrets · GITHUB_TOKEN自驱
#
# 核心架构:
#   GITHUB_TOKEN → GitHub Models API (gpt-4o/claude等52+模型)
#   Node.js内嵌代理服务 → cloudflared公网tunnel
#   URL写入repo vm-status.json → 本机轮询获取
#
# 连续性保障:
#   schedule 每4h触发 · job跑5h → 永远有重叠 · 无缝续接
#   concurrency: cancel-in-progress: false → 并行不冲突
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      duration_min:
        description: 'Keep-alive minutes (max 330)'
        required: false
        default: '300'
  schedule:
    # 每4小时 · 与5h job重叠 → 永续无间断
    - cron: '0 */4 * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: dao-vm-free-loop-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Write VM server
        run: |
          cat > /tmp/dao_vm_runner.js << 'SERVEREOF'
          "use strict";
          const http  = require("http");
          const https = require("https");
          const os    = require("os");
          const PORT  = 7862;
          const GH_TOKEN = process.env.GITHUB_TOKEN || "";
          const START_TS = Date.now();

          const GH_MODELS_HOST = "models.inference.ai.azure.com";

          const MODELS = [
            "gpt-4o", "gpt-4o-mini", "gpt-4.1", "gpt-4.1-mini",
            "claude-3-5-sonnet-20241022", "claude-3-5-haiku-20241022",
            "llama-3.3-70b-instruct", "llama-3.1-405b-instruct",
            "mistral-large-2411", "deepseek-r1", "phi-4"
          ];

          function log(msg) {
            process.stdout.write("[" + new Date().toISOString().slice(11,23) + "] " + msg + "\n");
          }

          function corsHeaders() {
            return {
              "Access-Control-Allow-Origin": "*",
              "Access-Control-Allow-Methods": "GET,POST,OPTIONS",
              "Access-Control-Allow-Headers": "*",
              "Content-Type": "application/json"
            };
          }

          function proxyGHModels(reqBody, res) {
            const body = Object.assign({}, reqBody);
            // Normalize model: gh/gpt-4o → gpt-4o
            if (body.model && body.model.startsWith("gh/")) {
              body.model = body.model.slice(3);
            }
            // default model
            if (!body.model || body.model === "auto") {
              body.model = "gpt-4o-mini";
            }
            const bodyStr = JSON.stringify(body);
            const opts = {
              hostname: GH_MODELS_HOST,
              port: 443,
              path: "/chat/completions",
              method: "POST",
              headers: {
                "Authorization": "Bearer " + GH_TOKEN,
                "Content-Type": "application/json",
                "Content-Length": Buffer.byteLength(bodyStr),
                "User-Agent": "dao-vm-gha/272"
              },
              timeout: 120000
            };
            const upstream = https.request(opts, (uRes) => {
              const hdrs = Object.assign({}, corsHeaders());
              if (uRes.headers["content-type"]) {
                hdrs["Content-Type"] = uRes.headers["content-type"];
              }
              res.writeHead(uRes.statusCode, hdrs);
              uRes.pipe(res);
            });
            upstream.on("error", (e) => {
              if (!res.headersSent) {
                res.writeHead(502, corsHeaders());
                res.end(JSON.stringify({ error: { message: e.message, type: "upstream_error" } }));
              }
            });
            upstream.setTimeout(120000, () => {
              upstream.destroy();
              if (!res.headersSent) {
                res.writeHead(504, corsHeaders());
                res.end(JSON.stringify({ error: { message: "upstream timeout", type: "timeout" } }));
              }
            });
            upstream.write(bodyStr);
            upstream.end();
          }

          const server = http.createServer((req, res) => {
            if (req.method === "OPTIONS") {
              res.writeHead(200, corsHeaders());
              return res.end();
            }

            const url = req.url.split("?")[0];

            // Health
            if (url === "/health" || url === "/_/health" || url === "/") {
              res.writeHead(200, corsHeaders());
              return res.end(JSON.stringify({
                ok: true,
                provider: "gha",
                version: "272",
                model: "github-models-proxy",
                uptime: Math.round((Date.now() - START_TS) / 1000),
                hostname: os.hostname(),
                gh_token: !!GH_TOKEN,
                ts: Date.now()
              }));
            }

            // Models list
            if (url === "/v1/models") {
              res.writeHead(200, corsHeaders());
              return res.end(JSON.stringify({
                object: "list",
                data: MODELS.map(id => ({
                  id: "gh/" + id,
                  object: "model",
                  owned_by: "github",
                  created: 0
                }))
              }));
            }

            // Chat completions
            if (url === "/v1/chat/completions" && req.method === "POST") {
              let body = "";
              req.on("data", c => body += c);
              req.on("end", () => {
                try {
                  const parsed = JSON.parse(body || "{}");
                  proxyGHModels(parsed, res);
                } catch (e) {
                  res.writeHead(400, corsHeaders());
                  res.end(JSON.stringify({ error: { message: "invalid json: " + e.message } }));
                }
              });
              return;
            }

            res.writeHead(404, corsHeaders());
            res.end(JSON.stringify({ error: "not_found", path: url }));
          });

          server.listen(PORT, "0.0.0.0", () => {
            log("dao-vm-gha server :" + PORT + " ready · gh_token=" + !!GH_TOKEN);
          });

          process.on("uncaughtException", e => log("uncaughtException: " + e.message));
          SERVEREOF
          echo "Server script written"

      - name: Start VM server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node /tmp/dao_vm_runner.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3
          H=$(curl -s --max-time 5 http://localhost:7862/health)
          echo "Health: $H"
          if ! echo "$H" | grep -q '"ok":true'; then
            echo "Server failed to start"
            exit 1
          fi
          echo "Server OK"

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          echo "cloudflared: $(cloudflared --version | head -1)"

      - name: Start tunnel and capture URL
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:7862 --no-autoupdate > /tmp/cf.log 2>&1 &
          CF_PID=$!
          echo "CF_PID=$CF_PID" >> $GITHUB_ENV
          echo "Waiting for cloudflare URL..."
          CF_URL=""
          for i in $(seq 1 40); do
            sleep 2
            CF_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log 2>/dev/null | head -1)
            if [ -n "$CF_URL" ]; then
              echo "Got URL at attempt $i: $CF_URL"
              break
            fi
          done
          if [ -z "$CF_URL" ]; then
            echo "=== CF LOG ==="
            cat /tmp/cf.log
            exit 1
          fi
          echo "cf_url=$CF_URL" >> $GITHUB_OUTPUT
          echo "CF_URL=$CF_URL" >> $GITHUB_ENV

      - name: Verify tunnel
        run: |
          URL="$CF_URL"
          echo "Verifying: $URL"
          for i in 1 2 3 4 5; do
            sleep 4
            R=$(curl -s --max-time 10 "$URL/health" || echo "fail")
            echo "  attempt $i: ${R:0:100}"
            if echo "$R" | grep -q '"ok":true'; then
              echo "TUNNEL VERIFIED: $URL"
              break
            fi
          done

      - name: Report URL to repo (vm-status.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="$CF_URL"
          RUN_ID="${{ github.run_id }}"
          RUNNER="${{ runner.name }}"
          TS=$(date -u +%s)

          # Write vm-status.json
          cat > vm-status.json << EOF
          {
            "url": "$URL",
            "run_id": "$RUN_ID",
            "runner": "$RUNNER",
            "provider": "gha",
            "version": "272",
            "ts": $TS,
            "started": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main 2>/dev/null || true
          git add vm-status.json
          git commit -m "vm-status: $URL [run $RUN_ID]" || echo "no changes"
          git push || echo "push failed (non-critical)"
          echo ""
          echo "================================================"
          echo "VM URL: $URL"
          echo "Models: $URL/v1/models"
          echo "Chat:   $URL/v1/chat/completions"
          echo "================================================"

      - name: Keep alive (${{ github.event.inputs.duration_min || '300' }} min)
        run: |
          URL="$CF_URL"
          DURATION="${{ github.event.inputs.duration_min || '300' }}"
          START=$(date +%s)
          MAX_SEC=$((DURATION * 60))
          TICK=0
          echo "Keeping alive for ${DURATION} min... URL=$URL"
          while true; do
            sleep 60
            TICK=$((TICK + 1))
            NOW=$(date +%s)
            EL=$((NOW - START))
            if [ $EL -ge $MAX_SEC ]; then
              echo "[$(date -u +%H:%M:%S)] Reached ${DURATION}min · exiting"
              break
            fi
            LOCAL_H=$(curl -s --max-time 5 http://localhost:7862/health 2>/dev/null | head -c 80 || echo "dead")
            PUB_H=$(curl -s --max-time 10 "$URL/health" 2>/dev/null | head -c 60 || echo "dead")
            echo "[$(date -u +%H:%M:%S)] tick=$TICK el=$((EL/60))m local=${LOCAL_H:0:60} pub=${PUB_H:0:40}"

            # Every 30 ticks (30min): re-report URL to keep repo fresh
            if [ $((TICK % 30)) -eq 0 ]; then
              git -C "$GITHUB_WORKSPACE" pull --rebase origin main 2>/dev/null || true
              sed -i "s/\"ts\": [0-9]*/\"ts\": $(date +%s)/" "$GITHUB_WORKSPACE/vm-status.json" 2>/dev/null || true
              git -C "$GITHUB_WORKSPACE" add vm-status.json
              git -C "$GITHUB_WORKSPACE" commit -m "vm-status: heartbeat tick=$TICK" 2>/dev/null || true
              git -C "$GITHUB_WORKSPACE" push 2>/dev/null || echo "push failed"
              echo "  · heartbeat pushed"
            fi
          done

      - name: Trigger next run (self-restart before dying)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next run..."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/dao-vm-free-loop.yml/dispatches" \
            -d '{"ref":"main"}' && echo "Next run triggered" || echo "Trigger failed (cron will catch it)"

      - name: Dump logs
        if: always()
        run: |
          echo "=== CF LOG ==="
          tail -30 /tmp/cf.log 2>/dev/null || echo "none"
          echo "=== Server health ==="
          curl -s --max-time 5 http://localhost:7862/health 2>/dev/null || echo "dead"
