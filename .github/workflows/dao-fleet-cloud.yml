name: dao-fleet-cloud

# ════════════════════════════════════════════════════════════════════
# 印 95 · 真本源闭环 · 一 GH 账号即一切 · 主公 PC 真可关机
#
#   帛书·四十:   「反者道之动 · 弱者道之用 · 天下之物生于有 · 有生于无」
#   帛书·廿二:   「圣人执一 · 以为天下牧」
#   帛书·二十五: 「独立而不垓 · 可以为天地母」
#
# 主公诏 (2026-05-14):
#   「重新锚定本源 · 此核心所有均运行于云端 GitHub Actions
#    综合管理一切 · 不依赖本地一切 · 不依赖设备
#    一 GitHub 账号即一切 · 道法自然」
#
# 此 workflow ≠ 印 96 dao-fleet.yml (依主公本机 WAM 桥)
# 此 workflow = 印 95 cloud-only · token 池入主公私 gist · 0 PC 依
#
# 链路:
#   gist (主公私 · token 池主源) → Actions runner 拉 → ~/.dao/accounts.json
#   → fleet_vm_unit.js :7862 --public --auth-key sk-*
#   → cloudflared tunnel → public URL
#   → PATCH gist · daemons[] · web UI 即见
#   → keep alive 350 min · 30 min 重拉 gist 自适新号
#
# 触发:
#   ① workflow_dispatch (主公手动/Web UI 一键)
#   ② schedule cron · 每 5h · 自续 (主公关机时仍真活)
#   ③ push trigger.txt · 印 99 之路 (echo + commit + push 即触)
#
# 必设 GitHub repo secrets:
#   - DAO_POOL_GIST_ID  (主公一次 cli.js init 后输出)
#   - DAO_POOL_PAT      (PAT · scope: gist)
#   - DAO_AUTH_KEY      (sk-ws-proxy-* · 反代守门 · 任客 Authorization Bearer)
#
# 道义守八边 (帛书·七十三 「天网恢恢 · 疏而不失」):
#   1. 0 PC 依 · 主公关机活
#   2. PAT scope=gist 仅 · 不碰 repo (除非主公另设)
#   3. accounts.json 仅 runner 内 · 不写盘永久 · runner 销 即销
#   4. daemon URL 限 cloudflared 公网 · auth-key 守门
#   5. 不偷 token · 不绕 ACU · 不破 SLA
#   6. cron 5h <= 6h hard limit · 不撕 ACU
#   7. token rotation · 仅"读"主公 gist · 不"写"主公账号
#   8. workflow log 不打 token · 仅 prefix 8 字
# ════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      max_minutes:
        description: '最大跑时长 (分钟 · max 350)'
        required: false
        default: '300'
      auth_required:
        description: '是否守门 (sk-* Bearer · 默 yes)'
        required: false
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      gist_id:
        description: '印 100 · token 池 gist id (留空则用 repo secret DAO_POOL_GIST_ID)'
        required: false
        default: ''
      pat:
        description: '印 100 · gist scope PAT (留空则用 repo secret DAO_POOL_PAT · 仅当前 dispatch run 用)'
        required: false
        default: ''
      auth_key:
        description: '印 100 · sk-ws-proxy-* (留空则用 repo secret DAO_AUTH_KEY)'
        required: false
        default: ''
  schedule:
    # 每 5 小时一次 · 自续 (UTC · 凡 0/5/10/15/20 时)
    - cron: '0 */5 * * *'
  push:
    paths:
      - '.github/workflows/dao-fleet-cloud.yml'
      - 'trigger.txt'

permissions:
  contents: read

# 同时仅一 run · 旧 run 退 · 防 ACU 浪 · 帛书·六十「治大国若烹小鲜」
concurrency:
  group: dao-fleet-cloud
  cancel-in-progress: false  # 不杀活 daemon · 等其自然退

jobs:
  fleet:
    # 印 100 · 太极笙万物 · 任 fork 自跑自己之 daemon · 民莫之令而自均
    # (前印 95 限 zhouyoukang · 印 100 解此锁 · 用户 fork 即可一笔自举)
    runs-on: ubuntu-latest
    timeout-minutes: 355  # 6h hard - 5min 缓

    steps:
      - name: 一 · checkout
        uses: actions/checkout@v4

      - name: 二 · setup Node 22 (built-in WebSocket · daemon 需)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 三 · 拉 token 池 · gist → ~/.dao/accounts.json
        id: pull
        env:
          # 印 100: inputs 优先 (web 一笔传) · 退 repo secrets (主公自设 · cron 自续)
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
        run: |
          set -e
          echo "════════════════════════════════════════"
          echo "§ 印 95 · dao-fleet-cloud · 起跑"
          echo "  runner    : $(hostname)"
          echo "  user      : $(whoami)"
          echo "  trigger   : ${{ github.event_name }}"
          echo "  run id    : ${{ github.run_id }}"
          echo "  gist 设   : ${DAO_POOL_GIST_ID:0:8}... (省)"
          echo "════════════════════════════════════════"

          if [ -z "$DAO_POOL_GIST_ID" ] || [ -z "$DAO_POOL_PAT" ]; then
            echo ""
            echo "  ✗ 缺 secrets · 主公请:"
            echo ""
            echo "    1. 主公本机:"
            echo "       cd packages/dao-pool"
            echo "       node cli.js init --pat <PAT-gist-scope>"
            echo ""
            echo "    2. 设 repo secrets (init 输出 gist id):"
            echo "       gh secret set DAO_POOL_GIST_ID --body '<id>' -R zhouyoukang/windsurf-assistant"
            echo "       gh secret set DAO_POOL_PAT --body '<PAT>' -R zhouyoukang/windsurf-assistant"
            echo ""
            echo "    3. 重 dispatch 此 workflow"
            exit 1
          fi

          # 拉 gist · 立 ~/.dao/accounts.json
          cd packages/dao-pool
          node cli.js pull \
            --gist "$DAO_POOL_GIST_ID" \
            --pat "$DAO_POOL_PAT"

          # 校 accounts.json 形
          if [ ! -f "$HOME/.dao/accounts.json" ]; then
            echo "  ✗ accounts.json 未立"
            exit 2
          fi
          echo ""
          echo "  ✓ accounts.json 立"
          ACTIVE=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.HOME+'/.dao/accounts.json','utf8')).active||'(无)')")
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.HOME+'/.dao/accounts.json','utf8')).accounts.length)")
          echo "  ✓ active   : $ACTIVE"
          echo "  ✓ 候选数   : $COUNT"
          echo "ACTIVE=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "COUNT=$COUNT" >> "$GITHUB_OUTPUT"

      - name: 四 · 装 cloudflared
        run: |
          curl -fsSL -o /tmp/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cloudflared
          echo "  ✓ $(/tmp/cloudflared --version | head -1)"

      - name: 五 · 起 fleet_vm_unit · 公网 + auth 守门
        id: fleet
        env:
          # 印 100: inputs 优先 · 退 repo secret · 都无则空 (无守门 · 仅调试)
          DAO_AUTH_KEY: ${{ github.event.inputs.auth_key || secrets.DAO_AUTH_KEY }}
        run: |
          set +e
          echo ""
          echo "═══ § 5 · 起 fleet_vm_unit · :7862 ═══"
          mkdir -p /tmp/dao_logs
          cd "$GITHUB_WORKSPACE/packages/dao-core"

          # auth 守门: dispatch input=yes 或默 yes (公网必设 · 帛书·七十三)
          AUTH_REQ="${{ github.event.inputs.auth_required }}"
          AUTH_REQ="${AUTH_REQ:-yes}"

          AUTH_ARGS=""
          if [ "$AUTH_REQ" = "yes" ] && [ -n "$DAO_AUTH_KEY" ]; then
            AUTH_ARGS="--auth-key $DAO_AUTH_KEY"
            echo "  ✓ auth 守门 · key prefix=${DAO_AUTH_KEY:0:12}..."
          else
            echo "  ⚠ auth 守门未启 (公网开放 · 仅供调试)"
          fi

          nohup node fleet_vm_unit.js \
            --port 7862 \
            --public \
            $AUTH_ARGS \
            --account "actions-${{ github.run_id }}" \
            > /tmp/dao_logs/fleet.log 2>&1 &
          FLEET_PID=$!
          echo "  fleet PID=$FLEET_PID · 等 5s..."
          sleep 5

          if ! curl -fsS --max-time 5 http://127.0.0.1:7862/health > /tmp/fleet_health.json; then
            echo "  ✗ fleet 起失"
            tail -50 /tmp/dao_logs/fleet.log
            exit 1
          fi
          echo "  ✓ fleet 起 · /health 通"
          echo "FLEET_PID=$FLEET_PID" >> "$GITHUB_OUTPUT"

      - name: 六 · cloudflared tunnel · 暴 7862 公网
        id: tunnel
        run: |
          set +e
          echo ""
          echo "═══ § 6 · cloudflared tunnel ═══"
          mkdir -p /tmp/dao_logs
          nohup /tmp/cloudflared tunnel --no-autoupdate --protocol http2 \
            --url http://127.0.0.1:7862 \
            > /tmp/dao_logs/cf.log 2>&1 &
          CF_PID=$!
          echo "  cf PID=$CF_PID · 等 cf URL..."

          DAEMON_URL=""
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/dao_logs/cf.log 2>/dev/null | head -1)
            if [ -n "$URL" ]; then
              DAEMON_URL=$URL
              echo "  ★ DAEMON_URL=$URL after ${i}x2s"
              break
            fi
          done
          if [ -z "$DAEMON_URL" ]; then
            echo "  ✗ cf URL 未拿"
            tail -50 /tmp/dao_logs/cf.log
            exit 1
          fi
          echo "DAEMON_URL=$DAEMON_URL" >> "$GITHUB_OUTPUT"
          echo "CF_PID=$CF_PID" >> "$GITHUB_OUTPUT"

      - name: 七 · 报 daemon URL 回 gist (web UI 即见)
        env:
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
          DAEMON_URL: ${{ steps.tunnel.outputs.DAEMON_URL }}
        run: |
          set +e
          echo ""
          echo "═══ § 7 · 报 URL 回 gist ═══"
          cd packages/dao-pool
          # 拿 fleet /health 之 version + pool 信息
          HEALTH=$(curl -sS --max-time 5 http://127.0.0.1:7862/health 2>/dev/null || echo '{}')
          VERSION=$(echo "$HEALTH" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);console.log(j.version||j.fleet&&j.fleet.version||'1.0')}catch{console.log('?')}})")

          node cli.js report \
            --gist "$DAO_POOL_GIST_ID" \
            --pat "$DAO_POOL_PAT" \
            --host "actions-${{ github.run_id }}" \
            --url "$DAEMON_URL" \
            --session-id "actions-${{ github.run_id }}" \
            --port 7862 \
            --version "$VERSION" \
            || echo "  ⚠ 报 URL 失 · daemon 仍活"

      - name: 八 · 验真 e2e (公网 /health · /v1/models)
        env:
          DAEMON_URL: ${{ steps.tunnel.outputs.DAEMON_URL }}
        run: |
          set +e
          echo ""
          echo "═══ § 8 · 验真 e2e ═══"
          sleep 10
          echo "  → GET $DAEMON_URL/health"
          curl -sS --max-time 15 "$DAEMON_URL/health" | head -c 400
          echo ""
          echo ""
          echo "  → GET $DAEMON_URL/v1/models"
          curl -sS --max-time 15 "$DAEMON_URL/v1/models" | head -c 400
          echo ""

      - name: 九 · keep alive · 350 min · 30 min 重拉 gist · 5 min 重报 URL
        env:
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
          DAEMON_URL: ${{ steps.tunnel.outputs.DAEMON_URL }}
          FLEET_PID: ${{ steps.fleet.outputs.FLEET_PID }}
          MAX_MIN: ${{ github.event.inputs.max_minutes || '300' }}
        run: |
          set +e
          MAX_MIN="${MAX_MIN:-300}"
          # cron 触 时 · max-minutes 设默 300 (留 50 min 给前后步 + cron buffer)
          echo ""
          echo "═══ § 9 · keep alive · 最 $MAX_MIN 分 ═══"
          START=$(date +%s)
          MAX_SEC=$((MAX_MIN * 60))
          TICK=0
          while true; do
            NOW=$(date +%s)
            EL=$((NOW - START))
            if [ $EL -ge $MAX_SEC ]; then
              echo "[$(date -u +%H:%M:%S)] ★ 达 $MAX_MIN 分 · 退"
              break
            fi
            sleep 60
            TICK=$((TICK + 1))
            EL_MIN=$((EL / 60))

            H=$(curl -sS --max-time 5 http://127.0.0.1:7862/health 2>/dev/null | head -c 80 | tr '\n' ' ')
            P=$(curl -sS --max-time 8 "$DAEMON_URL/health" 2>/dev/null | head -c 50 | tr '\n' ' ')

            echo "[$(date -u +%H:%M:%S)] tick=$TICK el=${EL_MIN}m local=${H:0:50} public=${P:0:30}"

            # 每 5 tick (5 min) · 重报 URL 回 gist (防 web UI 看不到)
            if [ $((TICK % 5)) -eq 0 ]; then
              cd "$GITHUB_WORKSPACE/packages/dao-pool"
              node cli.js report \
                --gist "$DAO_POOL_GIST_ID" \
                --pat "$DAO_POOL_PAT" \
                --host "actions-${{ github.run_id }}" \
                --url "$DAEMON_URL" \
                --session-id "actions-${{ github.run_id }}" \
                --port 7862 > /dev/null 2>&1 && echo "  · 重报 URL"
              cd "$GITHUB_WORKSPACE"
            fi

            # 每 30 tick (30 min) · 重拉 gist · 主公若 push 新号则用新
            if [ $((TICK % 30)) -eq 0 ]; then
              echo "  · 30 min · 重拉 gist · 检 token 变"
              cd "$GITHUB_WORKSPACE/packages/dao-pool"
              OLD_ACTIVE=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.HOME+'/.dao/accounts.json','utf8')).active||'')")
              node cli.js pull \
                --gist "$DAO_POOL_GIST_ID" \
                --pat "$DAO_POOL_PAT" > /dev/null 2>&1 || echo "  ⚠ 重拉失 · 用旧"
              NEW_ACTIVE=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.HOME+'/.dao/accounts.json','utf8')).active||'')")
              if [ "$OLD_ACTIVE" != "$NEW_ACTIVE" ] && [ -n "$NEW_ACTIVE" ]; then
                echo "  ★ token 换号 · $OLD_ACTIVE → $NEW_ACTIVE · 重启 fleet"
                kill $FLEET_PID 2>/dev/null || true
                sleep 2
                cd "$GITHUB_WORKSPACE/packages/dao-core"
                AUTH_KEY="${{ secrets.DAO_AUTH_KEY }}"
                AUTH_ARGS=""
                if [ -n "$AUTH_KEY" ]; then
                  AUTH_ARGS="--auth-key $AUTH_KEY"
                fi
                nohup node fleet_vm_unit.js \
                  --port 7862 --public $AUTH_ARGS \
                  --account "actions-${{ github.run_id }}" \
                  > /tmp/dao_logs/fleet.log 2>&1 &
                FLEET_PID=$!
                echo "  · fleet 重起 PID=$FLEET_PID"
              else
                echo "  · token 未变 ($NEW_ACTIVE)"
              fi
              cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: 末 · 状态 dump (always · 不论成败)
        if: always()
        env:
          # 印 100: inputs 优先 (dispatch 时清此 run · 退 secrets · cron 时清)
          DAO_POOL_GIST_ID: ${{ github.event.inputs.gist_id || secrets.DAO_POOL_GIST_ID }}
          DAO_POOL_PAT: ${{ github.event.inputs.pat || secrets.DAO_POOL_PAT }}
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "§ 末 · 状态 dump"
          echo "════════════════════════════════════════"
          echo "  fleet log tail:"
          tail -50 /tmp/dao_logs/fleet.log 2>/dev/null || echo "(none)"
          echo ""
          echo "  cf log tail:"
          tail -30 /tmp/dao_logs/cf.log 2>/dev/null || echo "(none)"
          echo ""
          echo "  /health 末:"
          curl -sS --max-time 5 http://127.0.0.1:7862/health 2>&1 | head -c 500 || echo "(daemon dead)"
          echo ""
          # 退前清此 run 之 daemon 报 (web UI 不再见死链)
          if [ -n "$DAO_POOL_GIST_ID" ] && [ -n "$DAO_POOL_PAT" ]; then
            echo ""
            echo "  ◦ 清此 run 之 daemon 报 (gist):"
            cd "$GITHUB_WORKSPACE/packages/dao-pool" 2>/dev/null && \
            node -e "
              const G = require('./gist-pool');
              (async () => {
                try {
                  const { data } = await G.pull({ gistId: '$DAO_POOL_GIST_ID', pat: '$DAO_POOL_PAT' });
                  const pool = new G.GistPool({ data });
                  const before = pool.data.daemons.length;
                  pool.data.daemons = pool.data.daemons.filter(d => d.host !== 'actions-${{ github.run_id }}');
                  if (pool.data.daemons.length !== before) {
                    await G.push({ gistId: '$DAO_POOL_GIST_ID', pat: '$DAO_POOL_PAT', data: pool.data });
                    console.log('    ✓ 清此 run · 留 ' + pool.data.daemons.length);
                  } else {
                    console.log('    ◦ 此 run 已无报');
                  }
                } catch (e) { console.error('    ⚠ 清失: ' + e.message); }
              })();
            " || echo "    ⚠ 清 step 失"
          fi
