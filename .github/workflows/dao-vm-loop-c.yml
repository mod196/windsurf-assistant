name: dao-vm-loop-c
# 印273 · slot-c · 永续VM · 无为而无不为
on:
  workflow_dispatch:
    inputs:
      duration_min:
        description: 'Keep-alive minutes'
        default: '300'
  schedule:
    - cron: '30 */4 * * *'   # offset 30min
  push:
    paths:
      - 'trigger-c.txt'

permissions:
  contents: write
  actions: write

concurrency:
  group: dao-vm-slot-c
  cancel-in-progress: false

jobs:
  vm-slot-c:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      VM_SLOT: c

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -O /usr/local/bin/cloudflared && chmod +x /usr/local/bin/cloudflared
      - name: Start VM + Tunnel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VM_SLOT: c
        run: bash scripts/dao_vm_gha_bootstrap.sh c ${{ github.event.inputs.duration_min || '300' }}
      - name: Trigger next
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/dao-vm-loop-c.yml/dispatches" \
            -d '{"ref":"main"}' || true
