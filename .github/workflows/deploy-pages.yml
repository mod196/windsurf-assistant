name: Deploy Web UI to GitHub Pages

# 印 69 · 慎终若始 · 一次治本 · 官方 starter 风格
#   [1] configure-pages@v4 → v5
#   [2] paths 加 workflow 自身                    改本 yml 即触发 redeploy
#   [3] cancel-in-progress: false                生产 deploy 不被中止
#   [4] if owner == zhouyoukang                  fork 跑空 · 不污染用户 Actions
#
# 道氾呵其可左右也 (帛书·三十四) ── enablement: true 需 PAT 而非 GITHUB_TOKEN
# (actions/configure-pages 文档明示 · 这是 GitHub 硬规) · 故此 workflow 假定
# Pages 已启用 (一次性 owner 操作) · 走官方 starter 标准 · 道法自然.
#
# 首次启 Pages (zhouyoukang · 一次 30s):
#   1. https://github.com/zhouyoukang/windsurf-assistant/settings/pages
#   2. Source: 'GitHub Actions'  →  Save
#   3. 启用后任何对 web/** 或本 yml 的 push 即自动 deploy
#
# 用户 fork 路径独立: dao_github_sync.js 之 ensurePages() 用用户 PAT 自启
# 用户自家 Pages (branch source / main:/web), 不依赖本 workflow.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository_owner == 'zhouyoukang'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'web'
      - id: deployment
        uses: actions/deploy-pages@v4