# dao-boot.yml · 道 · 万法归宗 · 一键启动全链路
# ════════════════════════════════════════════════════════════════════════
#
#   「侯王若能守之，万物将自宾。」── 帛书三十二
#   「损之又损，以至于无为，无为而无不为。」── 帛书四十八
#   「天生天杀，道之理也。」── 阴符经
#
# ── 使命 ──────────────────────────────────────────────────────────────
#
#   用户 fork 此库 → 设置 ACCOUNTS secret → 触发此 workflow
#   → 全自动: 认证 → 代理服务器 → Cloudflare 公网隧道 → 就绪
#
# ── 用户只需三步 ─────────────────────────────────────────────────────
#
#   1. Fork: github.com/zhouyoukang/windsurf-assistant
#   2. Settings → Secrets → New secret:
#      名称: ACCOUNTS
#      值:   your@windsurf.com:yourpassword
#      (多账号: e1@x.com:pass1,e2@x.com:pass2)
#   3. Actions → dao-boot → Run workflow
#   → 等待 1-2 分钟 → API 就绪
#
# ── 自动续期 ──────────────────────────────────────────────────────────
#
#   每 5.5h 自动触发下一轮 · 永续运行
#   免费 Actions 限额: 2000 min/月 ÷ 330 min/轮 ≈ 6次/月 (轻度使用足够)
#
# ════════════════════════════════════════════════════════════════════════

name: "dao-boot · 一键启动全链路"

on:
  # 手动触发 (用户第一次使用 / 手动重启)
  workflow_dispatch:
    inputs:
      mode:
        description: "启动模式"
        required: false
        default: "full"
        type: choice
        options:
          - full        # 完整流程: 认证 + 代理服务器
          - auth_only   # 仅认证 (测试凭证)
          - proxy_only  # 仅启动代理 (已有 DAO_JWT)

      accounts_override:
        description: "临时账号 (留空使用 ACCOUNTS secret)"
        required: false
        default: ""

      gist_id:
        description: "已有 Gist ID (留空自动创建)"
        required: false
        default: ""

  # 定时保活 (每 5h 自动续期 · 确保不间断)
  # schedule:
  #   - cron: '0 */5 * * *'  # 用户可取消注释启用定时续期

permissions:
  contents: read
  actions: write   # 用于触发下一轮工作流
  models: read     # 印272 反者道之动 · GITHUB_TOKEN 可调 GitHub Models API (永久免费)
  id-token: write  # OIDC 预留 (未来 federated identity)

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Job 1: Setup — 认证 + 初始化 Gist (快速 · 1-2 分钟)
  # ════════════════════════════════════════════════════════════════════
  setup:
    name: "Step1 · 认证 + 初始化"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: inputs.mode != 'proxy_only'

    outputs:
      gist_id:    ${{ steps.setup.outputs.GIST_ID }}
      dao_jwt:    ${{ steps.setup.outputs.DAO_JWT }}
      api_server: ${{ steps.setup.outputs.DAO_API_SERVER }}

    steps:
      - name: "检出代码"
        uses: actions/checkout@v4

      - name: "Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: "验证 账号源 (印274 道生一一生二二生三 · 三源任一)"
        env:
          ACCOUNTS: ${{ inputs.accounts_override || secrets.ACCOUNTS }}
          DAO_JWT:  ${{ secrets.DAO_JWT }}
          GH_TOKEN: ${{ secrets.DAO_GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$ACCOUNTS" ] && [ -z "$DAO_JWT" ] && [ -z "$GH_TOKEN" ]; then
            echo "::error::需 ACCOUNTS 或 DAO_JWT 或 GITHUB_TOKEN 至少一个!"
            exit 1
          fi
          if [ -n "$ACCOUNTS" ]; then
            COUNT=$(echo "$ACCOUNTS" | tr ',' '\n' | grep -c ':' || echo 0)
            echo "✓ ACCOUNTS: ${COUNT} 个 windsurf 账号"
          fi
          if [ -n "$DAO_JWT" ]; then
            echo "✓ DAO_JWT 现成"
          fi
          if [ -n "$GH_TOKEN" ]; then
            echo "✓ GITHUB_TOKEN/DAO_GH_PAT 现成 · GitHub Models backend 可用 (永久免费)"
          fi
          if [ -z "$ACCOUNTS" ] && [ -z "$DAO_JWT" ] && [ -n "$GH_TOKEN" ]; then
            echo "⚡ gh-only mode: 将只启用 GitHub Models backend"
          fi

      - name: "运行 Setup (认证 + 初始化 Gist)"
        id: setup
        env:
          DAO_ACCOUNTS:       ${{ inputs.accounts_override || secrets.ACCOUNTS }}
          DAO_JWT:            ${{ secrets.DAO_JWT }}
          DAO_API_SERVER:     ${{ secrets.DAO_API_SERVER }}
          DAO_GIST_ID:        ${{ inputs.gist_id || secrets.DAO_GIST_ID }}
          # 优先 DAO_GH_PAT (含 gist scope), 默认 GITHUB_TOKEN 无 gist scope 故 gistCreate 403
          GITHUB_TOKEN:       ${{ secrets.DAO_GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          DAO_MODE:           setup
          DAO_DEBUG:          "0"
          # 印274 · backend 优先顺序 (setup 不用但入 ENV 供调试)
          DAO_BACKEND_PRIORITY: ${{ secrets.DAO_BACKEND_PRIORITY || 'gh,windsurf,devin' }}
        run: |
          echo "════════════════════════════════════════"
          echo "  dao_proxy.js · setup 模式"
          echo "════════════════════════════════════════"
          node 130-道独立体_Standalone/05-GitHub/dao_proxy.js setup

      - name: "输出 Setup 结果"
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║    Step1 Setup 完成                  ║"
          echo "║    Gist: ${{ steps.setup.outputs.GIST_ID }}"
          echo "╚══════════════════════════════════════╝"

  # ════════════════════════════════════════════════════════════════════
  # Job 2: Proxy — 代理服务器 + Cloudflare 隧道 (长期运行 · ~5.5h)
  # ════════════════════════════════════════════════════════════════════
  proxy:
    name: "Step2 · 代理服务器 (长期运行)"
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5.5 小时
    needs: [setup]
    if: |
      always() &&
      inputs.mode != 'auth_only' &&
      (needs.setup.result == 'success' || inputs.mode == 'proxy_only')

    steps:
      - name: "检出代码"
        uses: actions/checkout@v4

      - name: "Setup Node.js 22 (Devin Cloud WebSocket 需内置 WS)"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: "安装 cloudflared"
        run: |
          echo "安装 cloudflared ..."
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      - name: "启动代理服务器 + 隧道"
        env:
          DAO_JWT:            ${{ needs.setup.outputs.dao_jwt || secrets.DAO_JWT }}
          DAO_API_SERVER:     ${{ needs.setup.outputs.api_server || secrets.DAO_API_SERVER }}
          DAO_ACCOUNTS:       ${{ secrets.ACCOUNTS }}
          DAO_GIST_ID:        ${{ needs.setup.outputs.gist_id || inputs.gist_id || secrets.DAO_GIST_ID }}
          # GITHUB_TOKEN: 供 Gist/Secrets/Models API 三用 (印272 · 含 models:read perm)
          GITHUB_TOKEN:       ${{ secrets.DAO_GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          DAO_MODE:           proxy
          HUB_PORT:           "7799"
          DAO_DEBUG:          "0"
          # 印 271 反审升级: multi-account chat fallback
          DAO_MAX_ROTATIONS:  ${{ secrets.DAO_MAX_ROTATIONS || '30' }}
          # 印274 · 道生一一生二二生三 · backend 优先顺序 (默认 gh,windsurf,devin)
          DAO_BACKEND_PRIORITY: ${{ secrets.DAO_BACKEND_PRIORITY || 'gh,windsurf,devin' }}
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  dao_proxy.js · proxy 模式"
          echo "  将运行最长 5.5 小时后自动触发下一轮"
          echo "════════════════════════════════════════════════════════"
          node 130-道独立体_Standalone/05-GitHub/dao_proxy.js proxy

      - name: "输出最终状态"
        if: always()
        run: |
          echo "代理服务器已完成本轮运行"
          echo "如已配置自续期，下一轮将自动触发"

  # ════════════════════════════════════════════════════════════════════
  # Job 3: 快速状态检查 (可选)
  # ════════════════════════════════════════════════════════════════════
  status-check:
    name: "状态检查"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: inputs.mode == 'auth_only'
    needs: [setup]

    steps:
      - name: "检出代码"
        uses: actions/checkout@v4

      - name: "Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: "查看 Gist 状态"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAO_GIST_ID:  ${{ needs.setup.outputs.gist_id || secrets.DAO_GIST_ID }}
          DAO_MODE:     status
        run: |
          node 130-道独立体_Standalone/05-GitHub/dao_proxy.js status
